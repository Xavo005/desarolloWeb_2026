<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión — Tottus SGI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display: flex; min-height: 100vh; background: var(--bg); }
    .login-left {
      display: none;
      background: var(--primary);
      flex: 1; align-items: center; justify-content: center;
      flex-direction: column; color: #fff; padding: 40px;
    }
    .login-left h1 { font-size: 40px; font-weight: 700; letter-spacing: -1px; }
    .login-left p  { font-size: 16px; opacity: .85; margin-top: 12px; }
    .login-right {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card { width: 100%; max-width: 380px; }
    .login-brand { text-align: center; margin-bottom: 32px; }
    .login-brand .brand { font-size: 28px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
    .login-brand .sub   { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .login-form-card { background: var(--surface); border-radius: var(--radius-card); box-shadow: var(--shadow); padding: 28px; }
    .form-title { font-size: 18px; font-weight: 600; color: var(--primary); border-left: 3px solid var(--primary); padding-left: 10px; margin-bottom: 24px; }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap i.left  { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .input-icon-wrap i.right { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; }
    .input-icon-wrap input   { padding-left: 40px; padding-right: 40px; }
    .check-row { display: flex; align-items: center; gap: 8px; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-muted); font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .forgot-link { display: block; text-align: center; font-size: 14px; font-weight: 600; color: var(--primary); text-decoration: underline; }
    .error-banner { background: var(--danger-light); color: var(--danger); border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .login-footer { text-align: center; margin-top: 24px; font-size: 11px; color: var(--text-muted); }
    @media (min-width: 768px) { .login-left { display: flex; } }
  </style>
</head>
<body>
  <div class="login-left">
    <h1>TOTTUS</h1>
    <p>Sistema Gerencial de Inventario</p>
    <p style="margin-top:48px;opacity:.6;font-size:13px">Versión 2.0 · Chiclayo 2026</p>
  </div>
  <div class="login-right">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand">TOTTUS</div>
        <div class="sub">Sistema Gerencial Móvil</div>
      </div>
      <div class="login-form-card">
        <div class="form-title">Iniciar Sesión</div>
        {% if error %}
          <div class="error-banner"><i class="fa-solid fa-circle-xmark"></i>{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('login') }}">
          <div class="form-group">
            <label>Código de Empleado</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-user left"></i>
              <input type="text" name="codigo_empleado" placeholder="EMP-XXXX-XXX" required autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-lock left"></i>
              <input type="password" name="password" id="pwd" placeholder="••••••••" required autocomplete="current-password">
              <i class="fa-solid fa-eye right" id="toggle-pwd"></i>
            </div>
          </div>
          <div class="check-row">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Recordar en este dispositivo</label>
          </div>
          <button type="submit" class="btn-primary btn-full mt-4">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> Ingresar
          </button>
        </form>
        <div class="divider">·</div>
        <a href="{{ url_for('restablecer') }}" class="forgot-link">¿Olvidó su contraseña?</a>
      </div>
      <div class="login-footer">
        v2.0.0 · ¿Problemas? Contacte a TI: ext. 2500
      </div>
    </div>
  </div>
  <script>
    document.getElementById('toggle-pwd').addEventListener('click', () => {
      const p = document.getElementById('pwd');
      const i = document.getElementById('toggle-pwd');
      p.type = p.type === 'password' ? 'text' : 'password';
      i.className = p.type === 'password' ? 'fa-solid fa-eye right' : 'fa-solid fa-eye-slash right';
    });
  </script>
</body>
</html>
