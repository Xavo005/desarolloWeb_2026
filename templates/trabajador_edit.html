{% extends 'base.html' %}
{% block title %}Editar Trabajador{% endblock %}
{% block page_title %}Editar Personal{% endblock %}

{% block content %}
<div class="px-4" style="max-width:600px;margin:0 auto;padding-top:24px">
  <div class="card">
    <div style="font-size:18px;font-weight:700;margin-bottom:20px;color:var(--primary)">
      <i class="fa-solid fa-user-pen"></i> Modificar Datos de Personal
    </div>

    <form method="POST" action="{{ url_for('actualizar_trabajador_ruta') }}">
      
      <input type="hidden" name="id" value="{{ trabajador.id }}">

      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" name="nombre" value="{{ trabajador.nombre }}" required>
      </div>

      <div class="form-group">
        <label>Código de Empleado</label>
        <input type="text" name="codigo_empleado" value="{{ trabajador.codigo_empleado }}" required>
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" name="email" value="{{ trabajador.email if trabajador.email else '' }}">
      </div>

<div class="form-group">
        <label>Sede</label>
        <select name="sede" required>
          {% for s in sedes %}
            <option value="{{ s.nombre }}" {% if trabajador.sede|lower == s.nombre|lower %}selected{% endif %}>
              {{ s.nombre }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Rol / Perfil</label>
        <select name="rol" required>
          {% for r in roles %}
            <option value="{{ r.nombre|lower }}" {% if trabajador.rol|lower == r.nombre|lower %}selected{% endif %}>
              {{ r.nombre|capitalize }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Palabra Clave (Recuperación)</label>
        <input type="text" name="palabra_clave" value="{{ trabajador.palabra_clave }}" required>
      </div>

      <div class="form-group mt-3">
        <label>Nueva Contraseña (Dejar en blanco para conservar la misma)</label>
        <input type="password" name="nueva_password" placeholder="Ingresa una nueva clave si es necesario">
      </div>

      <div class="flex gap-3 mt-4" style="justify-content: flex-end;">
        <a href="{{ url_for('listar_trabajadores') }}" class="btn-secondary" style="height: 44px; display: inline-flex; align-items: center; text-decoration: none;">
          Cancelar
        </a>
        <button type="submit" class="btn-primary" style="height: 44px;">
          <i class="fa-solid fa-floppy-disk"></i> Guardar Cambios
        </button>
      </div>

    </form>
  </div>
</div>
{% endblock %}
