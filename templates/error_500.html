{% extends 'base.html' %}
{% block title %}Error interno del servidor{% endblock %}
{% block page_title %}Error 500{% endblock %}

{% block content %}
<div class="px-4" style="max-width:600px; margin: 80px auto; text-align: center;">
    <div class="card" style="padding: 48px 24px;">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 48px; color: var(--danger); margin-bottom: 24px;"></i>
        <h1 class="modal-title" style="font-size: 24px; margin-bottom: 12px;">Error interno del servidor</h1>
        <p class="text-muted" style="margin-bottom: 32px;">Ocurrió un problema inesperado. Intenta nuevamente.</p>
        
        <a href="{{ url_for('dashboard') }}" class="btn-primary" style="justify-content: center; height: 48px;">
            <i class="fa-solid fa-rotate-right"></i> Ir al Dashboard
        </a>
    </div>
</div>
{% endblock %}
