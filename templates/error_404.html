{% extends 'base.html' %}
{% block title %}Página no encontrada{% endblock %}
{% block page_title %}Error 404{% endblock %}

{% block content %}
<div class="px-4" style="max-width:600px; margin: 80px auto; text-align: center;">
    <div class="card" style="padding: 48px 24px;">
        <i class="fa-solid fa-map-location-dot" style="font-size: 48px; color: var(--danger); margin-bottom: 24px;"></i>
        <h1 class="modal-title" style="font-size: 24px; margin-bottom: 12px;">Página no encontrada</h1>
        <p class="text-muted" style="margin-bottom: 32px;">La ruta que buscas no existe en el sistema.</p>
        
        <a href="{{ url_for('dashboard') }}" class="btn-primary" style="justify-content: center; height: 48px;">
            <i class="fa-solid fa-house"></i> Volver al Dashboard
        </a>
    </div>
</div>
{% endblock %}
