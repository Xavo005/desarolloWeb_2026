<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer Contraseña</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { display: flex; min-height: 100vh; background: var(--bg); align-items: center; justify-content: center; padding: 24px; }
    .reset-card { width: 100%; max-width: 400px; background: var(--surface); border-radius: var(--radius-card); box-shadow: var(--shadow); padding: 28px; }
    .form-title { font-size: 18px; font-weight: 600; color: var(--primary); border-left: 3px solid var(--primary); padding-left: 10px; margin-bottom: 24px; }
    .error-banner { background: var(--danger-light); color: var(--danger); border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>
  <div class="reset-card">
    <div class="form-title">Recuperar Acceso</div>
    
    {% if error %}
      <div class="error-banner"><i class="fa-solid fa-circle-xmark"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('restablecer') }}">
      <div class="form-group">
        <label>Código de Empleado</label>
        <input type="text" name="codigo_empleado" placeholder="ADMIN-001" required>
      </div>

      <div class="form-group mt-3">
        <label>Palabra Clave de Seguridad</label>
        <input type="password" name="palabra_clave" placeholder="¿Cuál es tu palabra secreta?" required>
      </div>

      <div class="form-group mt-3">
        <label>Nueva Contraseña</label>
        <input type="password" name="clave_nueva" placeholder="Mínimo 8 caracteres" required>
      </div>

      <button type="submit" class="btn-primary btn-full mt-4">
        <i class="fa-solid fa-key"></i> Cambiar Contraseña
      </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
      <a href="{{ url_for('index') }}" style="font-size: 13px; color: var(--text-muted); text-decoration: none;">
        <i class="fa-solid fa-arrow-left"></i> Volver al Login
      </a>
    </div>
  </div>
</body>
</html>
